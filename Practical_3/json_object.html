<!DOCTYPE html>
<html>
<head>
    <title>Practical 3 - JSON Object</title>
</head>
<body>
    <h2>Client Side Scripting - Practical No. 3</h2>
    <script>
        // Create JSON object
        const student = {
            "rollno": 101,
            "name": "Amit",
            "marks": 85
        };
        // Display JSON object values
        document.write("Roll No: " + student.rollno + "<br>");
        document.write("Name: " + student.name + "<br>");
        document.write("Marks: " + student.marks);
    </script>
</body>
</html>
