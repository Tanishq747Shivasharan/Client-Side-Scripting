<!DOCTYPE html>
<html>
<head>
    <title>Practical 1 - Hello World</title>
</head>
<body>
    <h2>Client Side Scripting - Practical No. 1</h2>
    <script>
        // Display output in browser console
        console.log("Hello World");
        // Display output on web page
        document.write("Hello World");
        // Display output in alert box
        alert("Hello World");
    </script>
</body>
</html>
