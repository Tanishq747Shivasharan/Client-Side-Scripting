<!DOCTYPE html>
<html lang="en">
<head>
  <title>Practical 5 - AngularJS Form Validation</title>
  <!-- AngularJS CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    .error {
      color: red;
    }
  </style>
</head>
<body ng-app="myApp" ng-controller="formCtrl">
  <h2>Student Registration Form</h2>
  <form name="studentForm" ng-submit="submitForm()" novalidate>
    <!-- Name -->
    Name:
    <input type="text" name="name" ng-model="student.name" required>
    <span class="error" ng-show="studentForm.name.$touched && studentForm.name.$invalid">
      Name is required
    </span>
    <br><br>
    <!-- Email -->
    Email:
    <input type="email" name="email" ng-model="student.email" required>
    <span class="error" ng-show="studentForm.email.$touched && studentForm.email.$invalid">
      Valid email required
    </span>
    <br><br>
    <!-- Gender -->
    Gender:
    <input type="radio" ng-model="student.gender" value="Male"> Male
    <input type="radio" ng-model="student.gender" value="Female"> Female
    <br><br>
    <!-- Course -->
    Course:
    <select ng-model="student.course" required>
      <option value="">Select</option>
      <option>Computer</option>
      <option>IT</option>
      <option>Mechanical</option>
    </select>
    <br><br>
    <!-- Submit -->
    <button type="submit">Submit</button>
  </form>
  <script>
    var app = angular.module("myApp", []);
    app.controller("formCtrl", function ($scope) {
      $scope.student = {};
      $scope.submitForm = function () {
        if ($scope.studentForm.$valid) {
          alert("Form Submitted Successfully");
        }
      };
    });
  </script>
</body>
</html>
